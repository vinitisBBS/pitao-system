<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login · PISTÃO</title>
  <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='img/logo.jpg') }}"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;600;700&family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold:#f5c518; --gold2:#e8a000; --orange:#c96b00;
      --dark:#1a0f00; --darker:#0d0700; --brown:#3b1f00;
      --brown2:#5c3300; --cream:#f0ddb0; --green:#39d96b; --red:#e03c3c;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:'Roboto Condensed',sans-serif;
      background: var(--darker);
      background-image:
        repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(255,255,255,0.01) 40px,rgba(255,255,255,0.01) 41px),
        radial-gradient(ellipse at 50% 0%,rgba(200,100,0,0.15) 0%,transparent 65%);
      min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      padding:16px;
      color:var(--cream);
    }
    .login-wrap { width:100%; max-width:400px; animation: fadeUp 0.6s ease; }

    .logo-area { text-align:center; margin-bottom:24px; }
    .logo-area img {
      width:120px; height:120px; border-radius:50%;
      border:4px solid var(--gold);
      box-shadow:0 0 0 6px var(--brown), 0 0 30px rgba(245,197,24,0.4);
      object-fit:cover;
    }
    .logo-area h1 {
      font-family:'Bebas Neue',sans-serif;
      font-size:3rem; color:var(--gold);
      letter-spacing:8px; margin-top:10px;
      text-shadow:2px 2px 0 var(--brown), 0 0 20px rgba(245,197,24,0.3);
    }
    .logo-area p {
      font-family:'Oswald',sans-serif;
      font-size:0.72rem; letter-spacing:4px;
      text-transform:uppercase; color:var(--orange);
    }

    .card {
      background:linear-gradient(160deg,var(--brown) 0%,var(--dark) 100%);
      border:2px solid var(--gold2); border-radius:16px;
      padding:32px 28px;
      box-shadow:0 0 0 1px var(--brown2), 0 20px 60px rgba(0,0,0,0.7);
    }

    .form-row { margin-bottom:16px; }
    .form-row label {
      display:block;
      font-family:'Oswald',sans-serif; font-size:0.72rem;
      letter-spacing:3px; text-transform:uppercase;
      color:var(--gold2); margin-bottom:7px;
    }
    .form-row input {
      width:100%;
      background:var(--darker);
      border:1.5px solid var(--brown2);
      border-radius:8px; color:var(--cream);
      font-family:'Oswald',sans-serif; font-size:1.1rem;
      padding:13px 16px; outline:none;
      transition:border-color 0.2s, box-shadow 0.2s;
    }
    .form-row input:focus {
      border-color:var(--gold);
      box-shadow:0 0 0 3px rgba(245,197,24,0.12);
    }

    .btn-login {
      width:100%; margin-top:8px;
      padding:15px;
      background:linear-gradient(135deg,var(--gold),var(--gold2));
      border:none; border-radius:10px;
      font-family:'Bebas Neue',sans-serif;
      font-size:1.3rem; letter-spacing:5px;
      color:var(--dark); cursor:pointer;
      box-shadow:0 4px 20px rgba(200,130,0,0.35);
      transition:filter 0.2s, transform 0.15s;
    }
    .btn-login:hover { filter:brightness(1.1); }
    .btn-login:active { transform:scale(0.97); }

    .flashes { list-style:none; margin-bottom:16px; }
    .flashes li {
      padding:10px 14px; border-radius:8px;
      font-family:'Oswald',sans-serif; font-size:0.85rem; letter-spacing:1px;
    }
    .flashes .error { background:rgba(224,60,60,0.15); border:1px solid var(--red); color:var(--red); }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="logo-area">
    <img src="{{ url_for('static', filename='img/logo.jpg') }}" alt="PISTÃO"/>
    <h1>PISTÃO</h1>
    <p>Cidade Alta · Sistema Interno</p>
  </div>

  <div class="card">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <ul class="flashes">
      {% for cat, msg in messages %}
      <li class="{{ cat }}">{{ msg }}</li>
      {% endfor %}
    </ul>
    {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="form-row">
        <label>Login</label>
        <input type="text" name="login" placeholder="seu login" autocomplete="username" required autofocus/>
      </div>
      <div class="form-row">
        <label>Senha</label>
        <input type="password" name="senha" placeholder="••••••" autocomplete="current-password" required/>
      </div>
      <button class="btn-login" type="submit">⚙ Entrar</button>
    </form>
  </div>
</div>
</body>
</html>
